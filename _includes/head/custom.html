<link rel="icon" type="image/png" sizes="32x32" href="{{ base_path }}/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="{{ base_path }}/favicon/favicon-16x16.png">
<link rel="manifest" href="{{ base_path }}/favicon/site.webmanifest">
<link rel="mask-icon" href="{{ base_path }}/favicon/safari-pinned-tab.svg" color="#609162">
<meta name="msapplication-TileColor" content="#609162">
<meta name="theme-color" content="#ffffff">

<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>


<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>

<style>
  /* Sidebar CV button: filled green by default, inverts to white on hover */
  .author__urls a.author-cv {
    display: inline-block;
    text-align: left;
    color: #fff;
    background-color: #256821;
    border-color: #256821;
  }
  .author__urls a.author-cv:hover {
    color: #256821 !important;
    background-color: #fff !important;
  }
</style>

<!-- end custom head snippets -->
